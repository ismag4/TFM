theory:

  warm:

    python_path: .

    class: PR_natural.WarmNaturalInflation

  camb:
    external_primordial_pk: True
    extra_args:
      lmax: 4000
      lens_potential_accuracy: 4

params:

  ombh2:
    prior:
      min: 0.020
      max: 0.025

  omch2:
    prior:
      min: 0.10
      max: 0.14

  H0:
    prior:
      min: 60
      max: 75

  tau:
    prior:
      min: 0.04
      max: 0.09

  f:

    prior:

      min: 0.1

      max: 18.0
    ref: 5.0

  logCg:

    prior:

      min: 0.1

      max: 10.0
    ref: 4.0
  M:

    prior:

      min: 1e-5

      max: 1e-1
    ref: 0.0042

  As:

    derived: true

  ns:

    derived: true

  r:

    derived: true

  Q_star:

    derived: true

  phi_star:

    derived: true

likelihood:

  planck_2018_highl_plik.TTTEEE: null

  planck_2018_lowl.TT: null

  planck_2018_lowl.EE: null

  bicep_keck_2018: null

sampler:

  mcmc:
    drag: false

    Rminus1_stop: 0.01
    Rminus1_cl_stop: 0.2
    max_tries: 1000000

    burn_in: 500
    learn_proposal: True
    learn_proposal_Rminus1_max: 3.0
    oversample_power: 0.4
    proposal_scale: 1.8

resume: True

output: chains/mcmc_warm_inflation
